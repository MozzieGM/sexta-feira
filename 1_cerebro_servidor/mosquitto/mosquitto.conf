# ============================================================
# SEXTA-FEIRA — Configuração do Mosquitto (Broker MQTT)
# ============================================================
# O Mosquitto é o "carteiro" que distribui comandos do Cérebro
# para todos os dispositivos (PCs, ESP32s) na rede local.
#
# Tópicos utilizados:
#   casa/{comodo}/pc/comando  → Comandos para satélites PC
#   mk3/mascara               → Comandos para a máscara
#   mk3/reator                → Comandos para o reator arc
# ============================================================

# --- Listener MQTT padrão (porta 1883) ---
listener 1883
protocol mqtt

# --- Listener WebSocket (porta 9001) — para dashboards web futuros ---
listener 9001
protocol websockets

# --- Política de acesso (rede local confiável) ---
# Em produção, considere adicionar autenticação com password_file
allow_anonymous true

# --- Persistência de mensagens ---
persistence true
persistence_location /mosquitto/data/

# --- Logging ---
log_dest file /mosquitto/log/mosquitto.log
log_type all
